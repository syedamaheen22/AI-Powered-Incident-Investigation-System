<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phase 3 Incident Dashboard</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --panel: #fffdf8;
      --ink: #1e1a16;
      --accent: #a63d40;
      --muted: #6c6257;
      --line: #d9cfc3;
    }
    body {
      margin: 0;
      font-family: Georgia, "Iowan Old Style", serif;
      background: radial-gradient(circle at top left, #fff8ef, var(--bg));
      color: var(--ink);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    h1, h2 { margin: 0 0 12px; }
    .hero {
      display: grid;
      gap: 18px;
      grid-template-columns: 1.2fr 0.8fr;
      margin-bottom: 24px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.06);
    }
    .metric {
      font-size: 2.4rem;
      color: var(--accent);
    }
    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    ul { padding-left: 20px; margin: 0; }
    .stream { display: grid; gap: 10px; }
    .stream-item {
      padding: 12px 14px;
      border-left: 4px solid var(--accent);
      background: #fff6f2;
      border-radius: 10px;
    }
    .muted { color: var(--muted); }
    @media (max-width: 820px) {
      .hero { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <section class="card">
        <p class="muted">Phase 3 Advanced Features</p>
        <h1>Incident Investigation Dashboard</h1>
        <p id="rootCause"></p>
      </section>
      <section class="card">
        <p class="muted">Confidence</p>
        <div class="metric" id="confidence"></div>
      </section>
    </div>
    <div class="grid">
      <section class="card">
        <h2>Timeline</h2>
        <ul id="timeline"></ul>
      </section>
      <section class="card">
        <h2>Affected Services</h2>
        <ul id="services"></ul>
      </section>
      <section class="card">
        <h2>Recommended Actions</h2>
        <ul id="actions"></ul>
      </section>
      <section class="card">
        <h2>Streaming Insights</h2>
        <div id="stream" class="stream"></div>
      </section>
    </div>
  </div>
  <script>
    const report = {"root_cause_analysis":"payments-service v2.0.0: Updated payment gateway integration","timeline_of_events":[{"time":"2026-04-10T10:00:00Z","event":"Auth-service: Deployed v2.3.4: Upgraded dependencies for improved security","source":"deployment"},{"time":"2026-04-10T10:05:00Z","event":"Orders-service: Deployed v1.9.5-hotfix.2: Fixed issue with order status display","source":"deployment"},{"time":"2026-04-10T10:15:00Z","event":"Gateway-service: Deployed v3.0.1: Added support for new payment method (is_breaking_change): true","source":"deployment"},{"time":"2026-04-10T10:20:00Z","event":"Payments-service: Deployed v2.5.3: Improved performance by optimizing database queries","source":"deployment"},{"time":"2026-04-10T10:25:00Z","event":"Auth-service: Deployed v2.4.0-hotfix.1: Refactored token validation logic for better security","source":"deployment"},{"time":"2026-04-10T10:30:00Z","event":"Orders-service: Deployed v1.9.5: Added feature to display order history","source":"deployment"},{"time":"2026-04-10T10:35:00Z","event":"Gateway-service: Deployed v3.0.2: Updated payment gateway integration for new API endpoint","source":"deployment"},{"time":"2026-04-10T10:40:00Z","event":"Payments-service: Deployed v2.5.4: Fixed issue with transaction retry mechanism","source":"deployment"},{"time":"2026-04-10T11:15:00Z","event":"Auth-service: Deployed v2.3.5-hotfix.1: Updated dependencies for improved security and performance (is_breaking_change): false","source":"deployment"},{"time":"2026-04-10T11:25:00Z","event":"Orders-service: Deployed v1.9.6: Improved error handling for order processing","source":"deployment"},{"time":"2026-04-10T11:35:00Z","event":"Auth-service: Deployed v2.0.5: Updated password hashing algorithm for enhanced security","source":"deployment"},{"time":"2026-04-10T11:40:05Z","event":"Orders-service: Deployed v1.7.8: Minor performance optimization for search queries","source":"deployment"}],"affected_services":["auth-service","orders-service","payments-service","gateway-service"],"supporting_evidence":[{"claim":"payments-service v2.0.0: Updated payment gateway integration","citations":[{"source":"deployment_history","reference":"2026-04-10T11:50:10Z","snippet":"Deployed v2.1.0: Refactored token validation logic for better security [BREAKING]","relevance":"high"},{"source":"deployment_history","reference":"2026-04-10T12:45:00Z","snippet":"Deployed v2.0.0: Updated payment gateway integration [BREAKING]","relevance":"high"},{"source":"deployment_history","reference":"2026-04-10T13:05:00Z","snippet":"Deployed v2.0.0: Refactored token validation logic [BREAKING]","relevance":"high"},{"source":"logs","reference":"Dependency failure: orders->payments RPC connection reset","snippet":"Dependency failure: orders->payments RPC connection reset","relevance":"high"},{"source":"logs","reference":"Order event processing delay observed (post-14:00 degradation)","snippet":"Order event processing delay observed (post-14:00 degradation)","relevance":"high"}]},{"claim":"Cascading service impact","citations":[{"source":"dependency_graph","reference":"auth-service","snippet":"auth-service impacts orders-service, gateway-service, payments-service","relevance":"medium"},{"source":"dependency_graph","reference":"redis-cache","snippet":"redis-cache impacts auth-service, orders-service, gateway-service, payments-service, notifications-service","relevance":"medium"},{"source":"tickets_step2.json","reference":"users cannot log in","snippet":"TICKET INC-2010: Users can't log in due to auth-issue\nWe're seeing an issue where users are unable to log in. I think it might be related to the auth-service itself. Can you please look into it?","relevance":"medium"},{"source":"tickets_step2.json","reference":"users cannot log in","snippet":"TICKET INC-2007: Auth-service not authenticating users\nUsers are unable to log in. I think it might be an issue with the auth-service itself. Can you please investigate?","relevance":"medium"},{"source":"deployments_step4.json","reference":"auth-service deployment","snippet":"SERVICE: auth-service\nVERSION: v2.0.5\nCHANGE: Rolled back auth-service to a known good state","relevance":"medium"}]},{"claim":"Detected 2 ticket-to-evidence conflicts where user assumptions diverge from logs or deployments.","citations":[{"source":"logs","reference":"INC-2004","snippet":"DB issue with auth-service -> Ticket leans toward a database cause while logs are dominated by auth/token failures.","relevance":"medium"},{"source":"logs","reference":"INC-2011","snippet":"Orders service slow -> Ticket blames the frontend but backend dependency failures are present in logs.","relevance":"medium"}]}],"confidence_score":0.95,"recommended_actions":["Roll back or disable the suspected breaking deployment before wider recovery actions.","Add targeted regression tests around token parsing and authentication edge cases.","Strengthen dependency monitoring for auth, orders, and payments to catch cascade onset earlier."]};
    const stream = [{"step":1,"stage":"retrieval","message":"Loaded incident context for \"Auth-Service Error and Cascading Failures on 2026-04-10\" and aligned evidence from logs, tickets, deployments, and graph outputs."},{"step":2,"stage":"timeline","message":"Identified incident window 2026-04-10T11:50:10Z to 2026-04-10T12:45:00Z."},{"step":3,"stage":"root-cause","message":"Most likely root cause: payments-service v2.0.0: Updated payment gateway integration."},{"step":4,"stage":"confidence","message":"Calibrated confidence score computed at 0.98 using evidence corroboration, deployment signals, graph impact, and user feedback."}];
    document.getElementById("rootCause").textContent = report.root_cause_analysis;
    document.getElementById("confidence").textContent = report.confidence_score;
    for (const item of report.timeline_of_events) {
      const li = document.createElement("li");
      li.textContent = item.time + " - " + item.event;
      document.getElementById("timeline").appendChild(li);
    }
    for (const item of report.affected_services) {
      const li = document.createElement("li");
      li.textContent = item;
      document.getElementById("services").appendChild(li);
    }
    for (const item of report.recommended_actions) {
      const li = document.createElement("li");
      li.textContent = item;
      document.getElementById("actions").appendChild(li);
    }
    for (const item of stream) {
      const div = document.createElement("div");
      div.className = "stream-item";
      div.textContent = String(item.step) + ". " + item.message;
      document.getElementById("stream").appendChild(div);
    }
  </script>
</body>
</html>
